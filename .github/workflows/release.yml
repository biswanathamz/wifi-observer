name: Publish to PyPI

# Publishes the package when you cut a GitHub Release (tag like v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets are stored.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI project name : wifi-observer
#   Owner             : biswanathamz
#   Repository name   : wifi-observer
#   Workflow filename : release.yml
#   Environment name  : pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata renders
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.repository_owner == 'biswanathamz'
    environment:
      name: pypi
      url: https://pypi.org/project/wifi-observer/
    permissions:
      id-token: write   # REQUIRED for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
